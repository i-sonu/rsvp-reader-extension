<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Reader Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>RSVP Reader</h1>
      <p class="popup-subtitle">Speed reading settings</p>
    </header>

    <div class="settings-group">
      <label class="setting-label" for="wpm-input">
        <span class="setting-name">Reading Speed</span>
        <span class="setting-value" id="wpm-value">400 WPM</span>
      </label>
      <input type="range" id="wpm-input" min="100" max="1000" step="25" value="400">
    </div>

    <div class="settings-group">
      <label class="setting-label" for="length-input">
        <span class="setting-name">Length Weight</span>
        <span class="setting-value" id="length-value">0.6</span>
      </label>
      <input type="range" id="length-input" min="0" max="1" step="0.05" value="0.6">
      <p class="setting-hint">How strongly word length affects display time</p>
    </div>

    <div class="settings-group">
      <label class="setting-label" for="punct-input">
        <span class="setting-name">Punctuation Pause</span>
        <span class="setting-value" id="punct-value">1.5×</span>
      </label>
      <input type="range" id="punct-input" min="1" max="3" step="0.1" value="1.5">
      <p class="setting-hint">Extra time for words ending in punctuation</p>
    </div>

    <div class="settings-group">
      <label class="setting-label" for="anchor-input">
        <span class="setting-name">Anchor Position</span>
        <span class="setting-value" id="anchor-value">35%</span>
      </label>
      <input type="range" id="anchor-input" min="0.1" max="0.6" step="0.05" value="0.35">
      <p class="setting-hint">Position of the red focus letter within each word</p>
    </div>

    <div class="settings-group toggle-group">
      <label class="setting-label" for="underline-input">
        <span class="setting-name">Anchor Underline</span>
        <span class="setting-hint-inline">Accessibility aid for colorblind users</span>
      </label>
      <label class="toggle-switch">
        <input type="checkbox" id="underline-input">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="popup-actions">
      <button id="save-btn" class="btn-primary">Save Settings</button>
      <button id="reset-btn" class="btn-secondary">Reset Defaults</button>
    </div>

    <div id="save-status" class="save-status"></div>
  </div>

  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
